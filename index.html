<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<!-- ✅ Mobil-optimerad viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Zon App</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#f5f5f5;
  font-family:Arial;
}

#teamSelect{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:50;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:260px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card input{
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

.court{
  position:relative;
  width:95vw;
  max-width:360px;
  background:white;
  border-radius:16px;
  padding:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.zone{position:absolute;cursor:pointer}
.z1{bottom:45%;left:3%;width:20%;height:18%}
.z2{bottom:45%;left:25%;width:50%;height:18%}
.z3{bottom:45%;right:3%;width:20%;height:18%}
.z4{bottom:40%;left:3%;width:94%;height:9%}
.z5{bottom:30%;left:3%;width:94%;height:9%}
.z6{bottom:12%;left:3%;width:20%;height:18%}
.z7{bottom:12%;left:25%;width:50%;height:18%}
.z8{bottom:12%;right:3%;width:20%;height:18%}

.score{
  text-align:center;
  margin-bottom:10px;
  white-space:pre-line;
}

button{
  font-size:16px;
}

.nextBtn{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  padding:20px;
  border-radius:20px;
  width:90vw;
  max-width:320px;
  display:none;
}

.popup button{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:white;
}

.row{display:flex;gap:8px}

.numpad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.numpad button{
  padding:18px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="teamSelect">
  <div class="card">
    <input id="teamInput" placeholder="Motståndare">
    <button onclick="startMatch()">Starta match</button>
  </div>
</div>

<div class="court">
  <div class="score">
    <div id="teams">IFK Gnesta vs -</div>
    <div id="periodDisplay">Period 1</div>
    <div id="score">0 - 0</div>

    <button onclick="exportExcel()" style="margin-top:8px;">Spara</button>
    <button class="nextBtn" onclick="nextPeriod()">Nästa period</button>
  </div>

  <img src="Court.png" width="100%">

  <div class="zone z1" onclick="openPopup('Zon 1')"></div>
  <div class="zone z2" onclick="openPopup('Zon 2')"></div>
  <div class="zone z3" onclick="openPopup('Zon 3')"></div>
  <div class="zone z4" onclick="openPopup('Zon 4')"></div>
  <div class="zone z5" onclick="openPopup('Zon 5')"></div>
  <div class="zone z6" onclick="openPopup('Zon 6')"></div>
  <div class="zone z7" onclick="openPopup('Zon 7')"></div>
  <div class="zone z8" onclick="openPopup('Zon 8')"></div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <h3 id="zoneTitle"></h3>

  <button onclick="selectAction('Mål')">Mål</button>

  <div class="row" id="shotRow">
    <button onclick="selectAction('Skott')">Skott</button>
    <button onclick="selectAction('Täck')">Skott i täck</button>
  </div>

  <div id="followup"></div>
</div>

<div class="overlay" id="statOverlay"></div>

<div class="popup" id="statPopup">
  <h3>Period slut</h3>
  <div id="timer" style="text-align:center;font-size:20px;margin-bottom:10px;">00:00</div>
  <div id="statContent"></div>
  <button onclick="startNextPeriod()">Nästa period</button>
</div>

<script>
var scoreA=0, scoreB=0;
var currentZone="";
var stats=[];
var period=1;
var periodStats={1:[],2:[],3:[]};

var shotsOff=0, shotsDef=0;
var blockedOff=0, blockedDef=0;

var opponentName="";

/* TIMER */
var timerInterval;
var secondsElapsed = 0;

function startTimer(){
  secondsElapsed = 0;
  updateTimer();

  clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    secondsElapsed++;
    updateTimer();
  },1000);
}

function updateTimer(){
  var min = Math.floor(secondsElapsed / 60);
  var sec = secondsElapsed % 60;

  document.getElementById("timer").innerText =
    String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

function stopTimer(){
  clearInterval(timerInterval);
}

function startMatch(){
  var val=document.getElementById("teamInput").value.trim();
  if(!val){alert("Ange motståndare");return;}

  opponentName = val;
  document.getElementById("teams").innerText="IFK Gnesta vs "+opponentName;
  document.getElementById("teamSelect").style.display="none";
}

function openPopup(z){
  currentZone=z;
  zoneTitle.innerText=z;
  popup.style.display="block";
  overlay.style.display="block";

  followup.innerHTML="";
  document.getElementById("shotRow").style.display="flex";
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
}

function selectAction(a){

  var isOff=['Zon 1','Zon 2','Zon 3','Zon 4'].includes(currentZone);

  if(a==="Skott"){
    if(isOff) shotsOff++; else shotsDef++;
    stats.push({zon:currentZone,typ:"Skott"});
    periodStats[period].push({zon:currentZone,typ:"Skott"});
    closePopup(); return;
  }

  if(a==="Täck"){
    if(isOff) blockedOff++; else blockedDef++;
    stats.push({zon:currentZone,typ:"Skott i täck"});
    periodStats[period].push({zon:currentZone,typ:"Skott i täck"});
    closePopup(); return;
  }

  if(a==="Mål"){
    document.getElementById("shotRow").style.display="none";

    followup.innerHTML="";

    if(isOff){
      followup.innerHTML=
        "<button onclick=\"showLines('Mål','Direkt')\">Direkt</button>"+
        "<button onclick=\"showLines('Mål','Övrigt')\">Övrigt</button>";
    }else{
      showLines("Mål","");
    }
  }
}

function showLines(type,sub){

  var isOff=['Zon 1','Zon 2','Zon 3','Zon 4'].includes(currentZone);

  if(isOff){
    followup.innerHTML=
      "<button onclick=\"prepareGoal('"+type+"','"+sub+"','1')\">1 line</button>"+
      "<button onclick=\"prepareGoal('"+type+"','"+sub+"','2')\">2 line</button>"+
      "<button onclick=\"prepareGoal('"+type+"','"+sub+"','3')\">3 line</button>";
  }else{
    followup.innerHTML=
      "<button onclick=\"register('"+type+"','"+sub+"','1')\">1 line</button>"+
      "<button onclick=\"register('"+type+"','"+sub+"','2')\">2 line</button>"+
      "<button onclick=\"register('"+type+"','"+sub+"','3')\">3 line</button>";
  }
}

var currentInput="", scorer="", assist="", step="scorer";

function prepareGoal(type,sub,line){
  currentInput=""; scorer=""; assist=""; step="scorer";

  followup.innerHTML=`
    <div style="text-align:center">
      <div id="inputLabel">Målskytt</div>
      <div id="display"></div>
      <div class="numpad">${createPad(type,sub,line)}</div>
    </div>
  `;
}

function createPad(type,sub,line){
  let html="";
  for(let i=1;i<=9;i++) html+=`<button onclick="press(${i})">${i}</button>`;
  html+=`<button onclick="clearNum()">C</button>
         <button onclick="press(0)">0</button>
         <button onclick="next('${type}','${sub}','${line}')">OK</button>`;
  return html;
}

function press(n){currentInput+=n;display.innerText=currentInput;}
function clearNum(){currentInput="";display.innerText="";}

function next(type,sub,line){
  if(step==="scorer"){
    scorer=currentInput; currentInput="";
    display.innerText="";
    inputLabel.innerText="Assist";
    step="assist"; return;
  }
  assist=currentInput;
  register(type,sub,line,scorer,assist);
}

function register(type,sub,line,scorer,assist){

  var isOff=['Zon 1','Zon 2','Zon 3','Zon 4'].includes(currentZone);
  var team=isOff?"IFK Gnesta":opponentName;

  if(type==="Mål"){
    if(team==="IFK Gnesta") scoreA++; else scoreB++;
  }

  score.innerText=scoreA+" - "+scoreB;

  var obj={zon:currentZone,typ:type,sub:sub,line:line,lag:team};
  if(scorer) obj.målskytt=scorer;
  if(assist) obj.assist=assist;

  stats.push(obj);
  periodStats[period].push(obj);

  closePopup();
}

function nextPeriod(){

  var data=periodStats[period];

  var goalsA=0, goalsB=0;
  var shotsA=0, shotsB=0;
  var blockedA=0, blockedB=0;

  for(var i=0;i<data.length;i++){

    var team = data[i].lag;

    if(data[i].typ==="Mål"){
      if(team==="IFK Gnesta") goalsA++; else goalsB++;
    }

    if(data[i].typ==="Skott"){
      if(team==="IFK Gnesta") shotsA++; else shotsB++;
    }

    if(data[i].typ==="Skott i täck"){
      if(team==="IFK Gnesta") blockedA++; else blockedB++;
    }
  }

  statContent.innerHTML=
    "<b>Period "+period+"</b><br>"+
    "Ställning: "+scoreA+" - "+scoreB+"<br><br>"+

    "<b>IFK Gnesta</b><br>"+
    "Mål: "+goalsA+"<br>"+
    "Avslut på mål: "+shotsA+"<br>"+
    "Täckta skott: "+blockedA+"<br><br>"+

    "<b>"+opponentName+"</b><br>"+
    "Mål: "+goalsB+"<br>"+
    "Avslut på mål: "+shotsB+"<br>"+
    "Täckta skott: "+blockedB;

  statPopup.style.display="block";
  statOverlay.style.display="block";

  startTimer();
}

function startNextPeriod(){
  stopTimer();

  period++;
  if(period>3){alert("Match slut!");return;}
  periodDisplay.innerText="Period "+period;
  statPopup.style.display="none";
  statOverlay.style.display="none";
}

function exportExcel(){
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(stats),"Totalt");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(periodStats[1]),"Period 1");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(periodStats[2]),"Period 2");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(periodStats[3]),"Period 3");
  XLSX.writeFile(wb,"match_"+Date.now()+".xlsx");
}
</script>

</body>
</html>
